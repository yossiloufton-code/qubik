services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: qubik-backend
    environment:
      NODE_ENV: production
      PORT: 3000
      CORS_ORIGIN: http://localhost:8080,http://localhost:5173
      LOG_LEVEL: info
    ports:
      - "3000:3000"
    networks:
      - qubik-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
    container_name: qubik-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - qubik-network

networks:
  qubik-network:
    driver: bridge
